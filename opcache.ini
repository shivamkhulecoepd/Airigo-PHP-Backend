; PHP OPcache Configuration for Maximum Performance
; Add these settings to your php.ini file or create a separate opcache.ini file

[opcache]
; Enable OPcache
opcache.enable=1
opcache.enable_cli=1

; Memory allocation
opcache.memory_consumption=256
opcache.interned_strings_buffer=16

; Cache settings
opcache.max_accelerated_files=20000
opcache.max_wasted_percentage=10
opcache.use_cwd=1
opcache.validate_timestamps=0 ; Set to 1 in development, 0 in production
opcache.revalidate_freq=0    ; Set to 60 in development, 0 in production
opcache.revalidate_path=0

; Performance optimizations
opcache.save_comments=1
opcache.fast_shutdown=1
opcache.enable_file_override=1
opcache.optimization_level=0x7FFFBFFF

; Memory management
opcache.file_update_protection=0
opcache.max_file_size=0

; Interned strings
opcache.interned_strings_buffer=16

; JIT Configuration (PHP 8.0+)
opcache.jit_buffer_size=128M
opcache.jit=1235

; Logging
opcache.log_verbosity_level=1
opcache.error_log=/var/log/php/opcache.log

; File cache (optional - for when OPcache is not available)
opcache.file_cache=/tmp/opcache
opcache.file_cache_only=0
opcache.file_cache_consistency_checks=1

; Blacklist (add files that should not be cached)
opcache.blacklist_filename=/path/to/opcache-blacklist.txt